<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENIUS 10 - 樱木花道生日会 AR</title>
    <!-- 核心 AR 框架与动画插件 -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'PingFang SC', sans-serif; }
        
        /* 1. 你最要求的：粉色樱花主题封面 */
        #ui-overlay {
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #ffb7c5 0%, #ff758c 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10000; text-align: center;
            transition: opacity 0.5s ease;
        }
        
        #start-button {
            padding: 20px 60px; font-size: 22px; background: #fff; color: #ff758c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); letter-spacing: 2px;
        }
        #start-button:active { transform: scale(0.95); }

        /* 加载提示文字样式 */
        #loading { 
            display: none; 
            color: white; 
            margin-top: 20px; 
            font-weight: bold; 
            animation: blink 1s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .hint { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            color: white; z-index: 10; font-weight: bold; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }

        /* 调试日志：如果模型出错了会在这里显示 */
        #debug-log {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: #00ff00; padding: 10px;
            font-size: 10px; z-index: 20000; display: none; border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="debug-log">Debug Log:</div>

    <div id="ui-overlay">
        <div style="font-size: 60px; margin-bottom: 10px;">🌸</div>
        <h1 style="font-size: 2.8rem; margin: 0; letter-spacing: 5px;">GENIUS 10</h1>
        <p style="margin-bottom: 40px; opacity: 0.9;">樱木花道生日会 AR 限定</p>
        <button id="start-button">唤醒天才花道</button>
        <!-- 修改处：文本改为“正在召唤天才花道” -->
        <div id="loading">正在召唤天才花道...</div>
    </div>

    <div class="hint" id="info-text">对准卡片正面，看天才灌篮！</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- ⚠️ 请确保你的人物模型文件名叫 jersey.glb，篮球叫 ball.glb -->
            <a-asset-item id="sakuragiModel" src="./jersey.glb" crossorigin="anonymous"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb" crossorigin="anonymous"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            <!-- 樱花飘落背景 -->
            <a-entity sakura-falling></a-entity>

            <!-- 代码自研篮架系统 (红白经典配色) -->
            <a-entity id="hoop-system" position="0.3 0.6 -0.15" scale="0.6 0.6 0.6">
                <a-box position="0 0.3 -0.05" width="1.2" height="0.8" depth="0.05" color="white"></a-box>
                <a-box position="0 0.18 0" width="0.45" height="0.3" depth="0.02" color="#b91d1d" material="wireframe: true; wireframeLineWidth: 5"></a-box>
                <a-torus position="0 0 0.2" rotation="90 0 0" radius="0.22" radius-tubular="0.015" color="#b91d1d"></a-torus>
                <a-cone position="0 -0.2 0.2" radius-bottom="0.12" radius-top="0.22" height="0.4" color="white" material="opacity: 0.5; transparent: true; wireframe: true"></a-cone>
            </a-entity>

            <!-- 樱木动作控制：灌篮 -> 落地 -> 弯腰捡球 -> 起身定格 -->
            <a-gltf-model 
                id="sakuragi"
                src="#sakuragiModel"
                position="0 -0.5 0" 
                scale="0.65 0.65 0.65"
                animation-mixer="clip: *; loop: once; clampWhenFinished: true"
                /* 动作 1: 起跳灌篮位移 */
                animation__jump="property: position; from: 0 -0.5 0; to: 0 0.4 0; dur: 800; easing: easeOutQuad; startEvents: targetFound"
                /* 动作 2: 落地位移 */
                animation__land="property: position; from: 0 0.4 0; to: 0 -0.2 0; dur: 400; delay: 1200; easing: easeInQuad; startEvents: targetFound"
                /* 动作 3: 弯腰捡球位移 (重心下潜) */
                animation__bend="property: position; from: 0 -0.2 0; to: 0 -0.4 0; dur: 350; delay: 1650; easing: easeInOutSine; startEvents: targetFound"
                /* 动作 4: 起身定格 */
                animation__stand="property: position; from: 0 -0.4 0; to: 0 -0.2 0; dur: 350; delay: 2000; easing: easeInOutSine; startEvents: targetFound"
            >
            </a-gltf-model>

            <!-- 篮球动作控制 -->
            <a-gltf-model 
                id="basketball"
                src="#ballModel"
                position="0.2 -0.2 0.2" 
                scale="0.13 0.13 0.13"
                /* 随人起跳入筐 */
                animation__b1="property: position; from: 0.2 -0.2 0.2; to: 0.48 0.75 0.1; dur: 800; easing: easeOutQuad; startEvents: targetFound"
                /* 穿网落地 */
                animation__b2="property: position; from: 0.48 0.75 0.1; to: 0.48 -0.7 0; dur: 450; delay: 1100; easing: easeInQuad; startEvents: targetFound"
                /* 捡球：球从地面移动到手部 (对应弯腰时刻) */
                animation__b3="property: position; from: 0.48 -0.7 0; to: -0.25 0.25 0.15; dur: 550; delay: 1650; easing: easeOutBack; startEvents: targetFound"
                /* 指尖自转循环 */
                animation__spin="property: rotation; to: 0 360 0; dur: 800; easing: linear; loop: true"
            >
            </a-gltf-model>

            <!-- 漫画气泡：捡球定格后弹出 -->
            <a-entity 
                id="speech-bubble"
                position="0.45 0.45 0.1" 
                scale="0 0 0"
                animation__pop="property: scale; to: 1 1 1; dur: 600; delay: 2400; easing: easeOutBack; startEvents: targetFound">
                
                <a-entity geometry="primitive: plane; width: 1.5; height: 0.55" material="color: #fff; opacity: 0.95; shader: flat"></a-entity>
                <a-entity geometry="primitive: triangle; vertexA: 0 0 0; vertexB: -0.15 -0.2 0; vertexC: 0.05 -0.2 0" material="color: #fff; shader: flat" position="-0.3 -0.25 0"></a-entity>
                
                <a-text value="I AM A GENIUS!" color="#b91d1d" align="center" width="4" position="0 0.13 0.01" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
                <a-text value="\u6211\u53ef\u662f\u5929\u624d\u554a\uff01" color="#b91d1d" align="center" width="3.5" position="0 -0.12 0.01" font="https://cdn.aframe.io/fonts/NotoSansCJKjp-msdf.json"></a-text>
            </a-entity>

            <a-light type="ambient" intensity="1.1"></a-light>
            <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>
        </a-entity>
    </a-scene>

    <script>
        // 日志助手
        const log = (msg) => {
            const el = document.querySelector('#debug-log');
            el.style.display = 'block';
            el.innerText += "\n> " + msg;
        };

        // 樱花飘落效果
        AFRAME.registerComponent('sakura-falling', {
            init: function () {
                this.petals = [];
                for (let i = 0; i < 40; i++) {
                    const petal = document.createElement('a-entity');
                    petal.setAttribute('geometry', { primitive: 'plane', width: 0.045, height: 0.03 });
                    petal.setAttribute('material', { color: '#ffb7c5', transparent: true, opacity: 0.85, side: 'double' });
                    petal.setAttribute('position', {x: (Math.random()-0.5)*2.5, y: Math.random()*2+1.5, z: (Math.random()-0.5)*1.5});
                    petal.userData = { speed: Math.random()*0.007+0.003, swing: Math.random()*0.02, step: Math.random()*Math.PI*2 };
                    this.el.appendChild(petal);
                    this.petals.push(petal);
                }
            },
            tick: function () {
                this.petals.forEach(p => {
                    let pos = p.getAttribute('position');
                    pos.y -= p.userData.speed;
                    p.userData.step += 0.02;
                    pos.x += Math.sin(p.userData.step) * p.userData.swing;
                    if (pos.y < -1.2) { pos.y = 2; pos.x = (Math.random()-0.5)*2.5; }
                    p.setAttribute('position', pos);
                    let rot = p.getAttribute('rotation');
                    p.setAttribute('rotation', {x: rot.x+1.5, y: rot.y+1, z: rot.z+0.5});
                });
            }
        });

        // 启动交互
        const startBtn = document.querySelector('#start-button');
        const overlay = document.querySelector('#ui-overlay');
        const scene = document.querySelector('a-scene');
        const loadingDiv = document.querySelector('#loading');

        startBtn.addEventListener('click', () => {
            // 点击后隐藏按钮并显示“召唤天才花道”的加载文字
            startBtn.style.display = 'none';
            loadingDiv.style.display = 'block';

            const arSystem = scene.systems["mindar-image-system"];
            if (arSystem) {
                arSystem.start(); 
                scene.addEventListener("arReady", () => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                });
            } else {
                log("错误: AR 系统初始化失败，请检查脚本引入。");
            }
        });

        // 模型加载排错
        document.querySelector('#sakuragiModel').addEventListener('model-error', () => {
            log("无法加载模型: jersey.glb。请确认文件名正确且已上传到 GitHub。");
        });

        const target = document.querySelector('#ar-target');
        target.addEventListener("targetFound", () => {
            document.querySelector('#info-text').innerText = "🌸 天才时刻！祝樱木生日快乐！ 🌸";
            document.querySelector('#info-text').style.color = "#FFD700";
        });
    </script>
</body>
</html>
