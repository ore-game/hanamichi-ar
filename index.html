<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>樱木花道：生日限定 AR</title>
    <!-- 引入官方最新版 A-Frame Extras 动画插件 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background-color: #000; }
        
        /* 粉丝页封面 */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 2000; text-align: center;
            transition: opacity 0.8s ease;
        }
        #start-button {
            padding: 22px 60px; font-size: 24px; background: white; color: #ff758c;
            border: none; border-radius: 60px; cursor: pointer; font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-top: 30px;
        }

        /* 状态诊断面板 (保持极简) */
        #debug-panel {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; font-size: 12px; z-index: 3000; border-radius: 8px;
            pointer-events: none; line-height: 1.5; border: 1px solid rgba(255,255,255,0.2);
        }

        /* 漫画字幕气泡 */
        #bubble {
            position: fixed; bottom: 35%; left: 50%; transform: translateX(-50%);
            background: white; padding: 20px 30px; border-radius: 50px;
            border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            display: none; z-index: 100; font-weight: 900; color: #000; 
            text-align: center; font-size: 30px; font-style: italic;
        }
        #bubble:after {
            content: ''; position: absolute; bottom: -20px; left: 40px;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>

    <!-- 诊断面板 -->
    <div id="debug-panel">
        👤 樱木: <span id="model-status" style="color:#aaa;">加载中...</span><br>
        ⚡ 引擎: <span id="anim-status" style="color:#aaa;">待命</span>
    </div>

    <!-- 封面层 -->
    <div id="ui-overlay">
        <h1 style="font-size: 4rem; margin: 0; font-weight: 900;">GENIUS 10</h1>
        <p style="opacity: 0.9; font-size: 1.3rem;">“因为我是天才啊！”</p>
        <button id="start-button">唤醒天才花道</button>
    </div>

    <!-- 字幕气泡 -->
    <div id="bubble">I'M A GENIUS!</div>

    <script>
        // 🌸 樱花特效组件
        AFRAME.registerComponent('sakura-particles', {
            init: function () {
                this.petals = [];
                for (let i = 0; i < 35; i++) {
                    const petal = document.createElement('a-plane');
                    petal.setAttribute('width', '0.08'); petal.setAttribute('height', '0.05');
                    petal.setAttribute('material', {color: '#ffb7c5', transparent: true, opacity: 0.85, side: 'double'});
                    const x = (Math.random() - 0.5) * 4;
                    const y = Math.random() * 4 + 1;
                    const z = (Math.random() - 0.5) * 3;
                    petal.setAttribute('position', {x, y, z});
                    petal.userData = { speed: Math.random() * 0.01 + 0.01 };
                    this.el.appendChild(petal);
                    this.petals.push(petal);
                }
            },
            tick: function () {
                this.petals.forEach(p => {
                    let pos = p.getAttribute('position');
                    pos.y -= p.userData.speed;
                    if (pos.y < -1) pos.y = 3;
                    p.setAttribute('position', pos);
                    let rot = p.getAttribute('rotation');
                    p.setAttribute('rotation', {x: rot.x+2, y: rot.y+1, z: rot.z+1});
                });
            }
        });
    </script>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="hanamichiModel" src="hanamichii.glb"></a-asset-item>
            <a-asset-item id="ballModel" src="ball.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
            
            <a-entity sakura-particles></a-entity>

            <!-- 🎯 解决穿模的核心：篮筐推远到 z: -3.6，高度提升到 2.4 -->
            <!-- 纯净玻璃篮板 + 实心红框，杜绝灯笼感 -->
            <a-entity id="hoop-set" position="0 2.4 -3.6" visible="false">
                <a-plane position="0 0.5 0" width="1.8" height="1.05" color="#ffffff" material="opacity: 0.4; transparent: true; side: double"></a-plane>
                <a-plane position="0 0.675 0.01" width="0.6" height="0.02" color="#e84118"></a-plane>
                <a-plane position="0 0.225 0.01" width="0.6" height="0.02" color="#e84118"></a-plane>
                <a-plane position="-0.29 0.45 0.01" width="0.02" height="0.47" color="#e84118"></a-plane>
                <a-plane position="0.29 0.45 0.01" width="0.02" height="0.47" color="#e84118"></a-plane>
                <a-box position="0 0.05 0.1" width="0.1" height="0.05" depth="0.2" color="#333"></a-box>
                <a-torus position="0 0.05 0.35" rotation="90 0 0" radius="0.25" tube="0.015" color="#e84118"></a-torus>
            </a-entity>

            <!-- 樱木主体：初始背对相机冲向篮筐 -->
            <a-entity id="character"
                      gltf-model="#hanamichiModel" 
                      position="0 -0.8 0" 
                      scale="0.8 0.8 0.8" 
                      rotation="0 180 0" 
                      visible="false">
                
                <!-- 篮球 -->
                <a-entity id="basketball"
                          gltf-model="#ballModel"
                          position="0.2 1.3 0.3" 
                          scale="0.4 0.4 0.4"
                          visible="false">
                </a-entity>
            </a-entity>

            <!-- 💡 专属面部补光：确保他转身后，外貌特征(脸部/五官)清晰可见 -->
            <a-light type="ambient" intensity="1.5"></a-light>
            <!-- 这盏灯从相机上方打向角色正面 -->
            <a-light type="directional" position="0 3 2" intensity="1.5"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-button');
        const overlay = document.querySelector('#ui-overlay');
        const sceneEl = document.querySelector('a-scene');
        const character = document.querySelector('#character');
        const ball = document.querySelector('#basketball');
        const hoop = document.querySelector('#hoop-set');
        const bubble = document.querySelector('#bubble');

        const mStatus = document.getElementById('model-status');
        const aStatus = document.getElementById('anim-status');
        
        character.addEventListener('model-loaded', () => { mStatus.innerText = "✅ 就绪"; mStatus.style.color = "#0f0"; });

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            sceneEl.systems["mindar-image-system"].start();
        });

        let currentAnimFrame = null;
        let playState = 0; 

        document.querySelector('#target-anchor').addEventListener("targetFound", () => {
            character.setAttribute('visible', 'true');
            ball.setAttribute('visible', 'true');
            hoop.setAttribute('visible', 'true');
            
            // 初始状态：背对相机，准备冲向篮筐
            character.setAttribute('rotation', '0 180 0');
            bubble.style.display = 'none';
            playState = 0; 
            ball.removeAttribute('animation'); 

            // 自动唤醒官方动画引擎
            character.removeAttribute('animation-mixer');
            setTimeout(() => {
                character.setAttribute('animation-mixer', 'clip: *; loop: once; clampWhenFinished: true');
                aStatus.innerText = "🔥 完美运行";
                aStatus.style.color = "#0f0";
            }, 50);

            let startTime = Date.now();
            const animateSequence = () => {
                let elapsed = (Date.now() - startTime) / 1000;

                // 阶段1 (1.8s)：樱木起跳，篮球随之飞向远处的篮筐(z: -3.25 是篮圈中心点)
                if (elapsed >= 1.8 && playState === 0) {
                    playState = 1;
                    ball.setAttribute('animation', 'property: position; to: 0 2.8 -3.25; dur: 800; easing: easeOutQuad');
                } 
                // 阶段2 (2.6s)：球空心入网，垂直下落
                else if (elapsed >= 2.6 && playState === 1) {
                    playState = 2;
                    ball.setAttribute('animation', 'property: position; to: 0 0.5 -3.25; dur: 1000; easing: easeInQuad');
                }
                // 阶段3 (4.5s)：完全落地，全自动霸气转身！
                else if (elapsed >= 4.5 && playState === 2) {
                    playState = 3;
                    ball.removeAttribute('animation'); 
                    // 篮球瞬移回手中
                    ball.setAttribute('position', {x: 0.2, y: 1.3, z: 0.3}); 
                    
                    // 核心要求：展现完整外貌特征
                    // 瞬间将樱木的旋转角度强行设为 0（正面死死盯住屏幕）
                    character.setAttribute('rotation', '0 0 0'); 
                    bubble.style.display = 'block';
                    return; 
                }
                currentAnimFrame = requestAnimationFrame(animateSequence);
            };
            if (currentAnimFrame) cancelAnimationFrame(currentAnimFrame);
            animateSequence();
        });

        document.querySelector('#target-anchor').addEventListener("targetLost", () => {
            bubble.style.display = 'none';
            if (currentAnimFrame) cancelAnimationFrame(currentAnimFrame);
        });
    </script>
</body>
</html>
