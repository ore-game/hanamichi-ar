<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樱木花道 GENIUS 10</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #FFB6C1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 999;
        }
        #btn {
            padding: 15px 40px; background: white; color: #E60012;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="color:white; font-style:italic;">GENIUS 10</h1>
        <button id="btn">点击唤醒天才</button>
    </div>

    <a-scene 
        id="scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
        embedded color-space="sRGB" renderer="colorManagement: true; antialias: true;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="model" src="./final.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#model" scale="0.5 0.5 0.5"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#btn');
        const scene = document.querySelector('#scene');

        btn.addEventListener('click', async () => {
            btn.innerText = '正在调起相机...';
            
            try {
                // 安卓和 iOS 通用的强力唤起逻辑
                const constraints = { video: { facingMode: "environment" } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // 成功获取后立即释放，交给 MindAR
                stream.getTracks().forEach(t => t.stop());

                // 关键：给硬件 300ms 响应时间
                setTimeout(() => {
                    const arSystem = scene.systems["mindar-image-system"];
                    if (arSystem) {
                        arSystem.start();
                    }
                }, 300);
            } catch (err) {
                alert("无法访问摄像头。请确保在 Safari、Chrome 或手机自带浏览器中打开，并允许权限。");
                console.error(err);
            }
        });

        scene.addEventListener("arReady", () => {
            document.querySelector('#overlay').style.display = 'none';
        });
    </script>
</body>
</html>
