<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>樱木花道 GENIUS 10</title>
    <!-- A-Frame & MindAR 基础库 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script>
        // 模型材质修复组件：解决细节显示问题
        AFRAME.registerComponent('model-fixer', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;
                    mesh.traverse((node) => {
                        if (node.isMesh) {
                            node.material.side = THREE.DoubleSide;
                            const isFaceDetail = /eye|brow/i.test(node.name) || node.material.transparent;
                            if (isFaceDetail) {
                                node.material.transparent = true;
                                node.material.alphaTest = 0.05; 
                                node.material.depthWrite = true; 
                                node.material.depthTest = true;
                                node.renderOrder = 10; 
                                node.material.needsUpdate = true;
                            }
                        }
                    });
                });
            }
        });
    </script>
    <style>
        :root {
            --sakuragi-red: #E60012;
            --soft-pink: #FFB6C1;
            --dark-pink: #FF9AAB;
        }

        body { margin: 0; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background: #000; }
        
        /* 针对移动端视频流的比例修正 */
        video { object-fit: cover !important; }

        /* 封面遮罩层 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--soft-pink) 0%, var(--dark-pink) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; box-sizing: border-box; text-align: center;
        }
        
        #loading-overlay h1 {
            color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin: 0; font-size: 3.5rem; letter-spacing: -2px; font-weight: 900; font-style: italic;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .quote-container {
            position: relative; color: white; max-width: 280px; margin: 40px 0; padding: 20px;
        }

        .quote-container::before, .quote-container::after {
            content: ''; position: absolute; width: 25px; height: 25px;
            border: 2px solid rgba(255,255,255,0.4);
        }
        .quote-container::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .quote-container::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        .quote-text { font-size: 1.1rem; line-height: 1.8; font-weight: 500; display: block; }

        /* 唤醒按钮 */
        #start-btn {
            padding: 16px 60px; background: #FFFFFF; color: var(--sakuragi-red);
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            box-shadow: 0 10px 25px rgba(230,0,18,0.2); cursor: pointer;
            transition: all 0.3s ease; animation: pulse 2s infinite;
            opacity: 0.6; pointer-events: none;
        }

        #start-btn.ready { opacity: 1; pointer-events: auto; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .scanning-target {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px; pointer-events: none; display: none;
            background: linear-gradient(to right, white 20px, transparent 20px) 0 0,
                        linear-gradient(to right, white 20px, transparent 20px) 0 100%,
                        linear-gradient(to left, white 20px, transparent 20px) 100% 0,
                        linear-gradient(to left, white 20px, transparent 20px) 100% 100%,
                        linear-gradient(to bottom, white 20px, transparent 20px) 0 0,
                        linear-gradient(to bottom, white 20px, transparent 20px) 100% 0,
                        linear-gradient(to top, white 20px, transparent 20px) 0 100%,
                        linear-gradient(to top, white 20px, transparent 20px) 100% 100%;
            background-repeat: no-repeat; background-size: 40px 40px;
        }
        
        .scanning-target::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 10px white;
            animation: scanLine 2s linear infinite;
        }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        /* 樱花容器 */
        #sakura-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: none; overflow: hidden;
        }

        .sakura-petal {
            position: absolute; 
            background: linear-gradient(135deg, #ffd1da 0%, #ffb6c1 100%);
            border-radius: 100% 0px 100% 0px; opacity: 0;
            box-shadow: 0 0 6px rgba(255, 182, 193, 0.4);
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translate3d(0, -50px, 0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translate3d(var(--endX), 105vh, 0) rotate(var(--rot)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h1>GENIUS 10</h1>
        <div class="quote-container">
            <span class="quote-text">“老头子，你最光辉的时刻是在什么时候？而我，就是现在了！”</span>
        </div>
        <button id="start-btn">正在准备天才...</button>
        <p style="color: white; margin-top: 30px; font-size: 0.75rem; opacity: 0.6; letter-spacing: 1px;">POWERED BY MINDAR</p>
    </div>

    <div class="scanning-target" id="scan-hint"></div>
    <div id="sakura-container"></div>

    <!-- 关键改动：warmupTolerance: 1 (瞬间确认) missTolerance: 100 (超级粘性) -->
    <a-scene 
        id="mainScene"
        loading-screen="enabled: false"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; warmupTolerance: 1; missTolerance: 100; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="characterModel" src="./final.glb"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="sakuragi" gltf-model="#characterModel" model-fixer rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5" animation-mixer>
                <a-entity gltf-model="#ballModel" position="0.35 1.0 0.15" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"></a-entity>
                <a-entity position="1.1 2.3 0" animation="property: position; to: 1.1 2.40 0; dir: alternate; dur: 2000; loop: true">
                    <a-entity geometry="primitive: circle; radius: 0.85" material="color: #E60012; shader: flat; opacity: 0.75" position="0 0 -0.01" scale="1 0.45 1"></a-entity>
                    <a-entity geometry="primitive: circle; radius: 0.8" material="color: #ffffff; shader: flat" scale="1 0.45 1"></a-entity>
                    <a-text value="I'M A GENIUS !" color="#E60012" align="center" width="4.8" position="0 0 0.02"></a-text>
                </a-entity>
            </a-entity>
            <a-light type="ambient" intensity="0.7"></a-light>
            <a-light type="directional" position="1 2 2" intensity="1"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#loading-overlay');
        const sceneEl = document.querySelector('a-scene');
        const scanHint = document.querySelector('#scan-hint');
        const sakuraContainer = document.querySelector('#sakura-container');

        let isSystemReady = false;
        
        // --- 核心监测补丁 ---
        const patchSystem = setInterval(() => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            if (arSystem) {
                if (!arSystem.ui) {
                    arSystem.ui = {
                        showLoading: () => {}, hideLoading: () => {},
                        showScanning: () => {}, hideScanning: () => {}
                    };
                }
                clearInterval(patchSystem);
                isSystemReady = true;
                startBtn.innerText = "唤醒天才樱木花道";
                startBtn.classList.add('ready');
            }
        }, 100);

        let sakuraInterval = null;
        function createSakuraPetal() {
            const petal = document.createElement('div');
            petal.classList.add('sakura-petal');
            petal.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 8 + 8;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
            petal.style.setProperty('--endX', (Math.random() * 40 - 20) + 'vw');
            petal.style.setProperty('--rot', (Math.random() * 720) + 'deg');
            sakuraContainer.appendChild(petal);
            setTimeout(() => petal.remove(), 7000);
        }

        startBtn.addEventListener('click', () => {
            if (!isSystemReady) return;
            const arSystem = sceneEl.systems["mindar-image-system"];

            try {
                // 针对移动端 Safari/微信注入 playsinline 补丁
                const video = document.querySelector('video');
                if (video) {
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    // 强制设置视频流层级，防止遮挡识别图
                    video.style.zIndex = "1";
                }

                arSystem.start();
                startBtn.innerText = "正在激活时空...";
                startBtn.style.pointerEvents = 'none';

                const reveal = () => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { 
                        overlay.style.display = 'none'; 
                        scanHint.style.display = 'block'; 
                    }, 500);
                    sceneEl.removeEventListener("arReady", reveal);
                    sceneEl.removeEventListener("videoScanning", reveal);
                };

                sceneEl.addEventListener("arReady", reveal);
                sceneEl.addEventListener("videoScanning", reveal);
                // 3秒强制拉帘，防止事件未触发
                setTimeout(() => { if(overlay.style.display !== 'none') reveal(); }, 3000);

            } catch (err) {
                console.warn("启动补丁已处理:", err);
                window.location.reload(); 
            }
        });

        sceneEl.addEventListener("targetFound", () => {
            scanHint.style.display = 'none';
            sakuraContainer.style.display = 'block';
            if (!sakuraInterval) sakuraInterval = setInterval(createSakuraPetal, 250);
        });

        sceneEl.addEventListener("targetLost", () => {
            scanHint.style.display = 'block';
            sakuraContainer.style.display = 'none';
            clearInterval(sakuraInterval);
            sakuraInterval = null;
            sakuraContainer.innerHTML = '';
        });
    </script>
</body>
</html>
