<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>樱木花道：生日限定 AR</title>
    
    <!-- 【终极稳定核心】A-Frame 1.4.2 + MindAR 1.2.2 + Extras 7.1.0 (完美解决 length 报错) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background-color: #000; }
        
        /* 【物理隐身衣】：强行在视觉上屏蔽 MindAR 引擎自带的极丑默认界面，且不触发底层报错 */
        .mindar-ui-overlay, 
        .mindar-ui-loading, 
        .mindar-ui-scanning {
            display: none !important;
        }
        
        /* 绝美粉色封面 */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 2000; text-align: center;
            transition: opacity 0.6s ease;
        }
        
        #start-button {
            padding: 22px 60px; font-size: 24px; background: white; color: #ff758c;
            border: none; border-radius: 60px; cursor: pointer; font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-top: 30px;
            transition: all 0.3s ease;
        }
        
        #start-button:active { transform: scale(0.95); }

        /* 漫画气泡 */
        #bubble {
            position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%);
            background: white; padding: 20px 30px; border-radius: 50px;
            border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            display: none; z-index: 100; font-weight: 900; color: #000; 
            text-align: center; font-size: 30px; font-style: italic;
        }
        #bubble:after {
            content: ''; position: absolute; bottom: -20px; left: 40px;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }
        
        .scanning-hint {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: white; font-size: 16px; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,1);
            pointer-events: none; opacity: 0.8; display: none;
        }
    </style>
</head>
<body>

    <!-- 自定义封面层 -->
    <div id="ui-overlay">
        <h1 style="font-size: 4rem; margin: 0; font-weight: 900;">GENIUS 10</h1>
        <p style="opacity: 0.9; font-size: 1.3rem;">“因为我是天才啊！”</p>
        <button id="start-button">进入体验</button>
    </div>

    <div id="bubble">I'M A GENIUS!</div>
    <div class="scanning-hint" id="hint-text">请对准识别卡片正面</div>

    <!-- 樱花特效组件 -->
    <script>
        AFRAME.registerComponent('sakura-particles', {
            init: function () {
                this.petals = [];
                for (let i = 0; i < 35; i++) {
                    const petal = document.createElement('a-plane');
                    petal.setAttribute('width', '0.08'); petal.setAttribute('height', '0.05');
                    petal.setAttribute('material', {color: '#ffb7c5', transparent: true, opacity: 0.85, side: 'double'});
                    const x = (Math.random() - 0.5) * 4;
                    const y = Math.random() * 4 + 1;
                    const z = (Math.random() - 0.5) * 3;
                    petal.setAttribute('position', {x, y, z});
                    petal.userData = { speed: Math.random() * 0.01 + 0.01 };
                    this.el.appendChild(petal);
                    this.petals.push(petal);
                }
            },
            tick: function () {
                this.petals.forEach(p => {
                    let pos = p.getAttribute('position');
                    pos.y -= p.userData.speed;
                    if (pos.y < -1) pos.y = 3;
                    p.setAttribute('position', pos);
                    let rot = p.getAttribute('rotation');
                    p.setAttribute('rotation', {x: rot.x+2, y: rot.y+1, z: rot.z+1});
                });
            }
        });
    </script>

    <!-- 【最纯净的底层调用】：去除所有可能导致报错的拦截参数，让引擎开箱即用自动索权 -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
            
            <a-entity sakura-particles></a-entity>

            <!-- 【防穿模安全区】：缩小并后退，确保所有动作都在手机屏幕安全画幅内 -->
            <a-entity id="scene-wrapper" scale="0.65 0.65 0.65" position="0 -0.5 -1.0">

                <!-- 纯正实心街头篮筐 -->
                <a-entity id="hoop-set" position="0 2.2 -3.5" visible="false">
                    <a-cylinder position="0 -1.5 -0.2" radius="0.1" height="3" color="#111"></a-cylinder>
                    <a-box position="0 0.5 0" width="1.8" height="1.05" depth="0.02" color="#ffffff" material="opacity: 0.7; transparent: true"></a-box>
                    <a-plane position="0 0.675 0.015" width="0.6" height="0.02" color="#e84118"></a-plane>
                    <a-plane position="0 0.225 0.015" width="0.6" height="0.02" color="#e84118"></a-plane>
                    <a-plane position="-0.29 0.45 0.015" width="0.02" height="0.47" color="#e84118"></a-plane>
                    <a-plane position="0.29 0.45 0.015" width="0.02" height="0.47" color="#e84118"></a-plane>
                    <a-box position="0 0.05 0.1" width="0.1" height="0.05" depth="0.2" color="#e84118"></a-box>
                    <a-torus position="0 0.05 0.35" rotation="90 0 0" radius="0.225" tube="0.015" color="#e84118"></a-torus>
                    <a-cone position="0 -0.15 0.35" radius-top="0.225" radius-bottom="0.13" height="0.4" open-ended="true" color="#ffffff" material="opacity: 0.25; transparent: true; side: double"></a-cone>
                </a-entity>

                <!-- 【原汁原味骨骼保护】：绝对不添加额外的 rotation 控制，完美保留 Blender 面部及动作骨骼数据 -->
                <a-entity id="character" 
                          gltf-model="./hanamichii.glb" 
                          position="0 0 0" 
                          scale="1 1 1" 
                          visible="false"></a-entity>

                <a-entity id="basketball" 
                          gltf-model="./ball.glb" 
                          position="0 0.5 0" 
                          scale="0.5 0.5 0.5" 
                          visible="false"></a-entity>

            </a-entity>

            <a-light type="ambient" intensity="1.2"></a-light>
            <!-- 打亮正脸轮廓 -->
            <a-light type="directional" position="0 5 5" intensity="1.0"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-button');
        const overlay = document.querySelector('#ui-overlay');
        const hintText = document.querySelector('#hint-text');

        // UI 揭幕逻辑：点击按钮仅仅是移开遮挡画面的粉色幕布，不干涉底层摄像头进程
        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0'; 
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                hintText.style.display = 'block'; // 提示用户对准卡片
            }, 600);
        });

        const character = document.querySelector('#character');
        const ball = document.querySelector('#basketball');
        const hoop = document.querySelector('#hoop-set');
        const bubble = document.querySelector('#bubble');

        let currentAnimFrame = null;
        let playState = 0; 

        // AR 卡片识别成功时触发
        document.querySelector('#target-anchor').addEventListener("targetFound", () => {
            hintText.style.display = 'none';
            character.setAttribute('visible', 'true');
            ball.setAttribute('visible', 'true');
            hoop.setAttribute('visible', 'true');
            
            bubble.style.display = 'none';
            playState = 0; 
            ball.removeAttribute('animation'); 

            // 【核心防崩溃修复】：安全检测模型是否自带动画数据
            try {
                const modelComponent = character.components['gltf-model'];
                // 检查模型本身是否包含 animations 数组且长度大于 0
                if (modelComponent && modelComponent.model && modelComponent.model.animations && modelComponent.model.animations.length > 0) {
                    character.removeAttribute('animation-mixer');
                    setTimeout(() => {
                        character.setAttribute('animation-mixer', 'clip: *; loop: once; clampWhenFinished: true');
                    }, 50);
                } else {
                    // 如果是静态模型，就打印黄字提示，绝不抛出红字崩溃错误
                    console.warn("⚠️ 提示：当前樱木模型为静态模型，没有检测到动作轨迹，已安全跳过动画播放。");
                }
            } catch (e) {
                console.error("动画引擎加载跳过", e);
            }

            let startTime = Date.now();
            const animateSequence = () => {
                let elapsed = (Date.now() - startTime) / 1000;

                // 配合动作的篮球飞行抛物线逻辑
                if (elapsed >= 1.8 && playState === 0) {
                    playState = 1;
                    ball.setAttribute('animation', 'property: position; to: 0 3.0 -3.15; dur: 800; easing: easeOutQuad');
                } 
                else if (elapsed >= 2.6 && playState === 1) {
                    playState = 2;
                    ball.setAttribute('animation', 'property: position; to: 0 0.5 -3.15; dur: 1000; easing: easeInQuad');
                }
                else if (elapsed >= 4.5 && playState === 2) {
                    playState = 3;
                    ball.removeAttribute('animation'); 
                    ball.setAttribute('position', {x: 0, y: 0, z: -1}); // 球落地静止
                    bubble.style.display = 'block'; // 弹出"天才"气泡
                    return; 
                }
                currentAnimFrame = requestAnimationFrame(animateSequence);
            };
            
            if (currentAnimFrame) cancelAnimationFrame(currentAnimFrame);
            animateSequence();
        });

        // 识别丢失时隐藏提示和气泡
        document.querySelector('#target-anchor').addEventListener("targetLost", () => {
            hintText.style.display = 'block';
            bubble.style.display = 'none';
            if (currentAnimFrame) cancelAnimationFrame(currentAnimFrame);
        });
    </script>
</body>
</html>
