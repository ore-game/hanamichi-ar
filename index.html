<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>樱木花道 GENIUS 10</title>
    <!-- 使用更稳定的版本组合 -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script>
        AFRAME.registerComponent('model-fixer', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;
                    mesh.traverse((node) => {
                        if (node.isMesh) {
                            node.material.side = THREE.DoubleSide;
                            if (/eye|brow/i.test(node.name) || node.material.transparent) {
                                node.material.transparent = true;
                                node.material.alphaTest = 0.05; 
                                node.material.depthWrite = true; 
                                node.renderOrder = 10; 
                            }
                        }
                    });
                });
            }
        });
    </script>
    <style>
        :root {
            --sakuragi-red: #E60012;
            --soft-pink: #FFB6C1;
            --dark-pink: #FF9AAB;
        }

        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--soft-pink) 0%, var(--dark-pink) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s ease-out;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        #loading-overlay h1 {
            color: white;
            margin: 0;
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .quote-container {
            position: relative;
            color: white;
            max-width: 280px;
            margin: 50px 0;
            padding: 20px;
        }

        .quote-container::before, .quote-container::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.4);
        }
        .quote-container::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .quote-container::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        .quote-text { font-size: 1.15rem; line-height: 1.8; font-weight: 500; display: block; }
        .quote-author { font-size: 0.9rem; margin-top: 15px; opacity: 0.8; display: block; text-align: right; }

        #start-btn {
            padding: 16px 60px;
            background: rgba(255, 255, 255, 0.4); 
            color: rgba(255, 255, 255, 0.8); 
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #start-btn.ready {
            background: #FFFFFF;
            color: var(--sakuragi-red);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(230,0,18,0.2);
            animation: pulse 2s infinite;
            pointer-events: auto;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        #error-msg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #error-msg button {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--sakuragi-red);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
        }

        .scanning-target {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; height: 260px;
            border-radius: 20px;
            pointer-events: none;
            display: none;
            background: linear-gradient(to right, white 20px, transparent 20px) 0 0,
                        linear-gradient(to right, white 20px, transparent 20px) 0 100%,
                        linear-gradient(to left, white 20px, transparent 20px) 100% 0,
                        linear-gradient(to left, white 20px, transparent 20px) 100% 100%,
                        linear-gradient(to bottom, white 20px, transparent 20px) 0 0,
                        linear-gradient(to bottom, white 20px, transparent 20px) 100% 0,
                        linear-gradient(to top, white 20px, transparent 20px) 0 100%,
                        linear-gradient(to top, white 20px, transparent 20px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 40px 40px;
        }

        #sakura-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: none; overflow: hidden;
        }

        .sakura-petal {
            position: absolute; 
            background: linear-gradient(135deg, #ffd1da 0%, #ffb6c1 100%);
            border-radius: 100% 0px 100% 0px; 
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translate3d(0, -50px, 0) rotate(0deg); opacity: 0; }
            100% { transform: translate3d(var(--endX), 105vh, 0) rotate(var(--rot)); opacity: 0; }
        }

        /* 隐藏 MindAR 的自带 UI 干扰 */
        .mindar-ui-loading, .mindar-ui-scanning, .mindar-ui-error {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h1>GENIUS 10</h1>
        <div class="quote-container">
            <span class="quote-text">“老头子，你最光辉的时刻是在什么时候？而我，就是现在了！”</span>
            <span class="quote-author">—— 樱木花道</span>
        </div>
        <button id="start-btn">正在准备中...</button>
        <p style="color: white; margin-top: 30px; font-size: 0.75rem; opacity: 0.6;">POWERED BY MINDAR</p>
    </div>

    <div id="error-msg">
        <h3 style="color: var(--sakuragi-red); margin: 0 0 10px 0;">系统启动异常</h3>
        <p id="error-text" style="font-size: 0.9rem; color: #666; line-height: 1.6;">原因：摄像头权限被拦截或不支持 HTTPS。</p>
        <button onclick="window.location.reload()">重新尝试</button>
    </div>

    <div class="scanning-target" id="scan-hint"></div>
    <div id="sakura-container"></div>

    <a-scene 
        id="mainScene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="characterModel" src="./final.glb"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#characterModel" model-fixer scale="0.5 0.5 0.5" animation-mixer></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#loading-overlay');
        const sceneEl = document.querySelector('a-scene');
        const scanHint = document.querySelector('#scan-hint');
        const sakuraContainer = document.querySelector('#sakura-container');
        const errorBox = document.querySelector('#error-msg');
        const errorText = document.querySelector('#error-text');

        let isSystemReady = false;

        // 设置一个超时，如果 5 秒还没准备好，强制启用按钮（防死锁）
        const forceTimeout = setTimeout(() => {
            if (!isSystemReady) {
                console.warn("Ready event timed out, forcing enable.");
                setButtonReady("强制唤醒天才");
            }
        }, 5000);

        function setButtonReady(text = "唤醒天才樱木花道") {
            isSystemReady = true;
            clearTimeout(forceTimeout);
            startBtn.innerText = text;
            startBtn.classList.add('ready');
        }

        // 监听 MindAR 准备就绪
        sceneEl.addEventListener("arReady", () => {
            console.log("MindAR Ready event fired");
            setButtonReady();
        });

        // 轮询检查系统是否已存在（防止错过事件）
        const checkInterval = setInterval(() => {
            if (isSystemReady) {
                clearInterval(checkInterval);
                return;
            }
            if (sceneEl.systems["mindar-image-system"]) {
                console.log("MindAR System detected via polling");
                setButtonReady();
                clearInterval(checkInterval);
            }
        }, 500);

        sceneEl.addEventListener("arError", (event) => {
            errorBox.style.display = 'block';
            errorText.innerText = "摄像头启动失败。请确保您正在使用 HTTPS 协议，并允许了摄像头权限。";
        });

        // 启动逻辑
        startBtn.addEventListener('click', () => {
            if (!isSystemReady) return;
            
            startBtn.innerText = '正在请求摄像头...';
            
            const arSystem = sceneEl.systems["mindar-image-system"];
            if (arSystem) {
                try {
                    // 先启动 AR 系统
                    arSystem.start();
                    
                    // 隐藏遮罩
                    overlay.style.opacity = '0';
                    setTimeout(() => { 
                        overlay.style.display = 'none'; 
                        scanHint.style.display = 'block';
                    }, 500);
                } catch (e) {
                    errorBox.style.display = 'block';
                    errorText.innerText = "启动异常: " + e.message;
                }
            }
        });

        // 樱花和扫描逻辑
        let sakuraInterval;
        sceneEl.addEventListener("targetFound", () => {
            scanHint.style.display = 'none';
            sakuraContainer.style.display = 'block';
            if (!sakuraInterval) {
                sakuraInterval = setInterval(() => {
                    const petal = document.createElement('div');
                    petal.classList.add('sakura-petal');
                    petal.style.left = Math.random() * 100 + 'vw';
                    const size = Math.random() * 8 + 8;
                    petal.style.width = size + 'px';
                    petal.style.height = size + 'px';
                    petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    petal.style.setProperty('--endX', (Math.random() * 40 - 20) + 'vw');
                    petal.style.setProperty('--rot', (Math.random() * 720) + 'deg');
                    sakuraContainer.appendChild(petal);
                    setTimeout(() => petal.remove(), 6000);
                }, 250);
            }
        });

        sceneEl.addEventListener("targetLost", () => {
            scanHint.style.display = 'block';
            sakuraContainer.style.display = 'none';
            clearInterval(sakuraInterval);
            sakuraInterval = null;
        });
    </script>
</body>
</html>
