<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>樱木花道：天才时刻 AR</title>
    <!-- 核心库引入 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccarthy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* 粉丝页应援 UI：热血粉色渐变 */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1000; text-align: center;
        }
        #start-button {
            padding: 20px 50px; font-size: 24px; background: white; color: #ff758c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 30px;
            text-transform: uppercase;
        }
        #start-button:hover { transform: scale(1.1); background: #fff5f5; }

        /* 漫画风格气泡对话框 */
        #bubble {
            position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%);
            background: white; padding: 20px 30px; border-radius: 50px;
            border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            display: none; z-index: 100; font-weight: 900; color: #000; 
            text-align: center; font-size: 28px; font-style: italic;
        }
        /* 漫画气泡的小尖角 */
        #bubble:after {
            content: ''; position: absolute; bottom: -20px; left: 40px;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }
        #bubble:before {
            content: ''; position: absolute; bottom: -26px; left: 38px;
            border-width: 22px 22px 0 0; border-style: solid;
            border-color: #000 transparent transparent transparent;
            z-index: -1;
        }

        .hint { position: fixed; bottom: 30px; width: 100%; text-align: center; color: white; font-size: 14px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 5; }
    </style>
</head>
<body>

    <!-- 粉丝应援封面 -->
    <div id="ui-overlay">
        <!-- 文案更新：GENIUS 10 -->
        <h1 style="font-size: 3.5rem; margin: 0; font-weight: 900;">GENIUS 10</h1>
        <p style="opacity: 0.9; font-size: 1.2rem; letter-spacing: 2px;">“因为我是天才啊！”</p>
        <!-- 文案更新：唤醒天才花道 -->
        <button id="start-button">唤醒天才花道</button>
    </div>

    <!-- 漫画字幕气泡 -->
    <div id="bubble">I'M A GENIUS!</div>
    
    <div class="hint">请扫描您的“天才证件”识别卡</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="hanamichiModel" src="./hanamichii.glb"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <!-- 樱木主体：初始背对观众执行灌篮 -->
            <a-entity id="character"
                      gltf-model="#hanamichiModel" 
                      position="0 -0.5 0" 
                      scale="0.6 0.6 0.6" 
                      rotation="0 180 0"
                      animation-mixer="clip: *; loop: once; clampWhenFinished: true">
                
                <!-- 篮球逻辑控制 -->
                <a-entity id="basketball"
                          gltf-model="#ballModel"
                          position="0.2 1.3 0.3" 
                          scale="0.3 0.3 0.3">
                </a-entity>

            </a-entity>

            <!-- 场景灯光 -->
            <a-light type="ambient" intensity="1.2"></a-light>
            <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const uiOverlay = document.querySelector('#ui-overlay');
        const sceneEl = document.querySelector('a-scene');
        const character = document.querySelector('#character');
        const ball = document.querySelector('#basketball');
        const bubble = document.querySelector('#bubble');

        startButton.addEventListener('click', () => {
            uiOverlay.style.display = 'none';
            sceneEl.systems["mindar-image-system"].start();
        });

        // 识别成功后的逻辑控制
        character.closest('[mindar-image-target]').addEventListener("targetFound", () => {
            console.log("天才降临！");
            
            let startTime = Date.now();
            
            const runFx = () => {
                let elapsed = (Date.now() - startTime) / 1000;

                // 1. 灌篮飞出阶段 (约2.2秒)
                if (elapsed >= 2.2 && elapsed < 2.8) {
                    ball.setAttribute('position', {x: 0, y: 3.0, z: 1.5}); 
                } 
                // 2. 穿过篮筐阶段 (约2.8秒)
                else if (elapsed >= 2.8 && elapsed < 3.8) {
                    ball.setAttribute('position', {x: 0, y: 1.5, z: 1.8});
                }
                // 3. 落地转身瞬间 (4.5秒后)：球瞬移回手中，气泡弹出
                else if (elapsed >= 4.5) {
                    // 球回到手部固定坐标
                    ball.setAttribute('position', {x: 0.2, y: 1.3, z: 0.3});
                    
                    // 显示最终字幕：I'M A GENIUS!
                    bubble.style.display = 'block';
                    bubble.innerHTML = "I'M A GENIUS!";
                    
                    // 停止检查以节省性能
                    return; 
                }

                requestAnimationFrame(runFx);
            };

            runFx();
        });

        character.closest('[mindar-image-target]').addEventListener("targetLost", () => {
            bubble.style.display = 'none';
        });
    </script>
</body>
</html>
