<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GENIUS 10 - 樱木花道 AR 生日限定</title>
    <!-- 引入稳定版本的 A-Frame 和 MindAR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }
        
        /* 1. 粉色樱花主题封面 */
        #ui-overlay {
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #ffafbd 0%, #ff758c 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10000; text-align: center;
            transition: opacity 0.5s ease;
        }
        
        #start-button {
            padding: 18px 50px; font-size: 20px; background: #fff; color: #ff758c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }

        #loading-text { 
            display: none; color: white; margin-top: 20px; font-weight: bold; 
            animation: blink 1s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 引导提示 */
        .hint-bar { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            color: white; z-index: 10; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }

        /* 强制隐藏默认 UI */
        .mindar-ui-loading, .mindar-ui-scanning { display: none !important; }
        
        /* 报错浮窗 */
        #error-msg {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.8); color: white; padding: 10px;
            z-index: 20000; display: none; border-radius: 5px; font-size: 12px;
        }
    </style>
</head>

<body>
    <div id="error-msg"></div>

    <div id="ui-overlay">
        <div style="font-size: 50px; margin-bottom: 10px;">🌸</div>
        <h1 style="font-size: 2.4rem; margin: 0; letter-spacing: 4px;">GENIUS 10</h1>
        <p style="margin-bottom: 30px; opacity: 0.9;">樱木花道生日会 AR 限定</p>
        <button id="start-button">唤醒天才花道</button>
        <div id="loading-text">正在召唤天才花道...</div>
    </div>

    <div class="hint-bar" id="info-text">请对准“花花证件照”卡片</div>

    <!-- 这里的 imageTargetSrc 必须指向你 GitHub 上的 targets.mind 文件 -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="sakuragiModel" src="./jersey.glb" crossorigin="anonymous"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb" crossorigin="anonymous"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 这里的 targetIndex: 0 对应识别库里的第一张图 -->
        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            <!-- 樱花雨效果 -->
            <a-entity sakura-rain></a-entity>

            <!-- 篮架（代码生成） -->
            <a-entity position="0.3 0.6 -0.15" scale="0.6 0.6 0.6">
                <a-box position="0 0.3 -0.05" width="1.2" height="0.8" depth="0.05" color="white"></a-box>
                <a-box position="0 0.18 0" width="0.45" height="0.3" depth="0.02" color="#b91d1d" material="wireframe: true"></a-box>
                <a-torus position="0 0 0.2" rotation="90 0 0" radius="0.22" radius-tubular="0.015" color="#b91d1d"></a-torus>
                <a-cone position="0 -0.2 0.2" radius-bottom="0.12" radius-top="0.22" height="0.4" color="white" material="opacity: 0.4; transparent: true; wireframe: true"></a-cone>
            </a-entity>

            <!-- 樱木动画逻辑 -->
            <a-gltf-model 
                id="sakuragi"
                src="#sakuragiModel"
                position="0 -0.5 0" 
                scale="0.6 0.6 0.6"
                animation-mixer="clip: *; loop: once; clampWhenFinished: true"
                animation__jump="property: position; from: 0 -0.5 0; to: 0 0.4 0; dur: 800; easing: easeOutQuad; startEvents: targetFound"
                animation__land="property: position; from: 0 0.4 0; to: 0 -0.2 0; dur: 400; delay: 1200; easing: easeInQuad; startEvents: targetFound"
                animation__bend="property: position; from: 0 -0.2 0; to: 0 -0.4 0; dur: 350; delay: 1650; easing: easeInOutSine; startEvents: targetFound"
                animation__stand="property: position; from: 0 -0.4 0; to: 0 -0.2 0; dur: 350; delay: 2000; easing: easeInOutSine; startEvents: targetFound"
            ></a-gltf-model>

            <!-- 篮球动画逻辑 -->
            <a-gltf-model 
                id="basketball"
                src="#ballModel"
                position="0.2 -0.2 0.2" 
                scale="0.12 0.12 0.12"
                animation__b1="property: position; from: 0.2 -0.2 0.2; to: 0.48 0.75 0.1; dur: 800; easing: easeOutQuad; startEvents: targetFound"
                animation__b2="property: position; from: 0.48 0.75 0.1; to: 0.48 -0.7 0; dur: 450; delay: 1100; easing: easeInQuad; startEvents: targetFound"
                animation__b3="property: position; from: 0.48 -0.7 0; to: -0.25 0.25 0.15; dur: 500; delay: 1650; easing: easeOutBack; startEvents: targetFound"
                animation__spin="property: rotation; to: 0 360 0; dur: 800; easing: linear; loop: true"
            ></a-gltf-model>

            <!-- 语录气泡 -->
            <a-entity 
                id="bubble"
                position="0.45 0.45 0.1" 
                scale="0 0 0"
                animation__pop="property: scale; to: 1 1 1; dur: 500; delay: 2400; easing: easeOutBack; startEvents: targetFound">
                <a-entity geometry="primitive: plane; width: 1.5; height: 0.5" material="color: #fff; opacity: 0.95"></a-entity>
                <a-text value="I AM A GENIUS!" color="#b91d1d" align="center" width="4" position="0 0.1 0.01"></a-text>
                <a-text value="\u6211\u53ef\u662f\u5929\u624d\u554a\uff01" color="#b91d1d" align="center" width="3.5" position="0 -0.15 0.01" font="https://cdn.jsdelivr.net/gh/fcor/aframe-fonts@master/fonts/notosanscjkjp/NotoSansCJKjp-msdf.json"></a-text>
            </a-entity>

            <a-light type="ambient" intensity="1.0"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const showError = (msg) => {
            const el = document.getElementById('error-msg');
            el.style.display = 'block';
            el.innerText = msg;
        };

        // 樱花飘落系统
        AFRAME.registerComponent('sakura-rain', {
            init: function () {
                this.petals = [];
                for (let i = 0; i < 30; i++) {
                    const petal = document.createElement('a-entity');
                    petal.setAttribute('geometry', { primitive: 'plane', width: 0.04, height: 0.03 });
                    petal.setAttribute('material', { color: '#ffb7c5', transparent: true, opacity: 0.8, side: 'double' });
                    petal.setAttribute('position', {x: (Math.random()-0.5)*2, y: Math.random()*2+1, z: (Math.random()-0.5)*1});
                    petal.userData = { speed: Math.random()*0.005+0.002, step: Math.random()*Math.PI*2 };
                    this.el.appendChild(petal);
                    this.petals.push(petal);
                }
            },
            tick: function () {
                this.petals.forEach(p => {
                    let pos = p.getAttribute('position');
                    pos.y -= p.userData.speed;
                    p.userData.step += 0.02;
                    pos.x += Math.sin(p.userData.step) * 0.005;
                    if (pos.y < -1) pos.y = 2;
                    p.setAttribute('position', pos);
                    let rot = p.getAttribute('rotation');
                    p.setAttribute('rotation', {x: rot.x+1, y: rot.y+1, z: rot.z+1});
                });
            }
        });

        const startBtn = document.querySelector('#start-button');
        const overlay = document.querySelector('#ui-overlay');
        const loader = document.querySelector('#loading-text');
        const scene = document.querySelector('a-scene');

        startBtn.addEventListener('click', async () => {
            // 预检查 targets.mind 文件
            try {
                const response = await fetch('./targets.mind');
                if (!response.ok) throw new Error("识别库文件 targets.mind 找不到！请检查 GitHub 仓库。");
            } catch (e) {
                showError(e.message);
                return;
            }

            startBtn.style.display = 'none';
            loader.style.display = 'block';

            const arSystem = scene.systems["mindar-image-system"];
            if (arSystem) {
                // 请求权限并启动
                try {
                    await arSystem.start(); 
                    overlay.style.opacity = '0';
                    setTimeout(() => { 
                        overlay.style.display = 'none'; 
                        document.querySelector('#info-text').style.opacity = '1';
                    }, 500);
                } catch (err) {
                    showError("摄像头开启失败，请确保使用 HTTPS 并允许摄像头权限。");
                }
            }
        });

        const target = document.querySelector('#ar-target');
        target.addEventListener("targetFound", () => {
            const hint = document.querySelector('#info-text');
            hint.innerText = "🌸 天才降临！生日快乐！ 🌸";
            hint.style.color = "#FFD700";
        });
    </script>
</body>
</html>
