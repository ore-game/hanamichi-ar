<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>樱木花道：生日限定 AR</title>
    <!-- 核心驱动库 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccarthy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background-color: #000; }
        
        /* 粉丝应援封面 */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 2000; text-align: center;
            transition: opacity 0.8s ease;
        }
        
        #start-button {
            padding: 20px 50px; font-size: 24px; background: white; color: #ff758c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 30px;
        }

        /* 漫画风格字幕气泡 */
        #bubble {
            position: fixed; bottom: 35%; left: 50%; transform: translateX(-50%);
            background: white; padding: 20px 30px; border-radius: 50px;
            border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            display: none; z-index: 100; font-weight: 900; color: #000; 
            text-align: center; font-size: 32px; font-style: italic;
        }
        #bubble:after {
            content: ''; position: absolute; bottom: -22px; left: 40px;
            border-width: 22px 22px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .scanning-hint {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: white; font-size: 16px; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,1);
            pointer-events: none; opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- 粉丝页封面 -->
    <div id="ui-overlay">
        <h1 style="font-size: 4rem; margin: 0; font-weight: 900; letter-spacing: -2px;">GENIUS 10</h1>
        <p style="opacity: 0.9; font-size: 1.3rem; margin-top: 10px;">“因为我是天才啊！”</p>
        <button id="start-button">唤醒天才花道</button>
    </div>

    <!-- 字幕气泡 -->
    <div id="bubble">I'M A GENIUS!</div>
    
    <div class="scanning-hint" id="hint-text">请对准识别卡片正面...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="hanamichiModel" src="./hanamichii.glb"></a-asset-item>
            <a-asset-item id="ballModel" src="./ball.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 图像追踪 -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
            
            <!-- 樱花飘落粒子系统 -->
            <a-entity sakura-falling></a-entity>

            <!-- 【代码生成的篮筐】 -->
            <a-entity id="code-hoop" position="0 0 0" visible="false">
                <!-- 篮板 -->
                <a-box position="0 2.2 -1.4" width="1.8" height="1.1" depth="0.05" color="white"></a-box>
                <!-- 篮板红色方框 -->
                <a-box position="0 2.0 -1.37" width="0.6" height="0.45" depth="0.01" color="#b91d1d" material="wireframe: true; wireframeLinewidth: 10"></a-box>
                <!-- 篮圈连接臂 -->
                <a-box position="0 1.8 -1.25" width="0.1" height="0.1" depth="0.3" color="#555"></a-box>
                <!-- 橙色篮圈 -->
                <a-torus position="0 1.8 -1.0" rotation="90 0 0" radius="0.25" tube="0.02" color="orange"></a-torus>
                <!-- 简易篮网（用线框圆柱模拟） -->
                <a-cylinder position="0 1.55 -1.0" radius="0.25" height="0.5" open-ended="true" side="double" material="color: white; opacity: 0.4; transparent: true; wireframe: true"></a-cylinder>
            </a-entity>

            <!-- 樱木模型：初始背面视角 -->
            <a-entity id="character"
                      gltf-model="#hanamichiModel" 
                      position="0 -0.8 0" 
                      scale="0.75 0.75 0.75" 
                      rotation="0 180 0" 
                      visible="false">
                
                <!-- 篮球 -->
                <a-entity id="basketball"
                          gltf-model="#ballModel"
                          position="0.2 1.3 0.3" 
                          scale="0.4 0.4 0.4"
                          visible="false">
                </a-entity>

            </a-entity>

            <a-light type="ambient" intensity="1.5"></a-light>
            <a-light type="directional" position="2 4 2" intensity="1.2"></a-light>
        </a-entity>
    </a-scene>

    <script>
        // 樱花组件
        AFRAME.registerComponent('sakura-falling', {
            init: function () {
                this.petals = [];
                for (let i = 0; i < 40; i++) {
                    const petal = document.createElement('a-entity');
                    petal.setAttribute('geometry', {primitive: 'plane', width: 0.05, height: 0.03});
                    petal.setAttribute('material', {color: '#ffb7c5', transparent: true, opacity: 0.8, side: 'double'});
                    const x = (Math.random() - 0.5) * 4;
                    const y = Math.random() * 3 + 1;
                    const z = (Math.random() - 0.5) * 2;
                    petal.setAttribute('position', {x, y, z});
                    petal.userData = { speed: Math.random() * 0.01 + 0.008 };
                    this.el.appendChild(petal);
                    this.petals.push(petal);
                }
            },
            tick: function () {
                this.petals.forEach(p => {
                    const pos = p.getAttribute('position');
                    pos.y -= p.userData.speed;
                    if (pos.y < -1.5) pos.y = 2.5;
                    p.setAttribute('position', pos);
                    const rot = p.getAttribute('rotation');
                    p.setAttribute('rotation', {x: rot.x+2, y: rot.y+1, z: rot.z+1});
                });
            }
        });

        const startButton = document.querySelector('#start-button');
        const uiOverlay = document.querySelector('#ui-overlay');
        const sceneEl = document.querySelector('a-scene');
        const character = document.querySelector('#character');
        const ball = document.querySelector('#basketball');
        const hoop = document.querySelector('#code-hoop');
        const bubble = document.querySelector('#bubble');

        startButton.addEventListener('click', () => {
            uiOverlay.style.opacity = '0';
            // 手动启动 AR 系统
            sceneEl.systems["mindar-image-system"].start();
            setTimeout(() => { uiOverlay.style.display = 'none'; }, 800);
        });

        const targetAnchor = document.querySelector('#target-anchor');
        
        targetAnchor.addEventListener("targetFound", () => {
            console.log("天才发现！");
            character.setAttribute('visible', 'true');
            ball.setAttribute('visible', 'true');
            hoop.setAttribute('visible', 'true');
            
            // 解决 T-Pose：强制重启动画混合器
            character.removeAttribute('animation-mixer');
            character.setAttribute('animation-mixer', {
                clip: '*',
                loop: 'once',
                clampWhenFinished: true
            });
            
            let startTime = Date.now();
            
            const runSequence = () => {
                let elapsed = (Date.now() - startTime) / 1000;

                // 1. 篮球飞向篮圈 (z 轴向篮板移动)
                if (elapsed >= 1.8 && elapsed < 2.5) {
                    ball.setAttribute('position', {x: 0, y: 3.5, z: -0.5}); 
                } 
                // 2. 篮球从篮圈中心垂直下落 (z 轴对齐篮圈中心 -1.0)
                else if (elapsed >= 2.5 && elapsed < 4.0) {
                    ball.setAttribute('position', {x: 0, y: 1.0, z: -1.0});
                }
                // 3. 落地转身瞬间：球回手，字幕跳出
                else if (elapsed >= 4.5) {
                    ball.setAttribute('position', {x: 0.2, y: 1.3, z: 0.3});
                    bubble.style.display = 'block';
                    bubble.innerHTML = "I'M A GENIUS!";
                    return;
                }
                requestAnimationFrame(runSequence);
            };
            runSequence();
        });

        targetAnchor.addEventListener("targetLost", () => {
            bubble.style.display = 'none';
        });
    </script>
</body>
</html>
